<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Table for Student Sessions</title>
    <style>
        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
        }
        table, th, td {
            border: 1px solid #ccc;
        }
        th, td {
            padding: 10px;
            text-align: left;
        }
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <h1>Dynamic Table for Student Sessions</h1>
    <form action="/submit" method="POST">
        <table id="studentTable">
            <thead>
                <tr>
                    <th>Student Name</th>
                    <th>Session Start</th>
                    <th>Session End</th>
                    <th>Court Location</th>
                    <th>Court Type</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td><input type="text" name="studentName[]" required></td>
                    <td>
                        <select name="sessionStart[]" required>
                            <!-- Options will be populated dynamically -->
                        </select>
                    </td>
                    <td>
                        <select name="sessionEnd[]" required>
                            <!-- Options will be populated dynamically -->
                        </select>
                    </td>
                    <td>
                        <select name="courtLocation[]" class="court-location" required>
                            <option value="">Select Location</option>
                            <option value="UWA">UWA</option>
                            <option value="PBA Redcliffe">PBA Redcliffe</option>
                            <option value="PBA Canningvale">PBA Canningvale</option>
                            <option value="PBA Malaga">PBA Malaga</option>
                            <option value="Kingsway">Kingsway</option>
                        </select>
                    </td>
                    <td>
                        <select name="courtType[]" class="court-type hidden">
                            <option value="">Select Type</option>
                            <option value="Hebat Court">Hebat Court</option>
                            <option value="Super Court">Super Court</option>
                        </select>
                    </td>
                    <td><button type="button" class="delete-row">Delete</button></td>
                </tr>
            </tbody>
        </table>
        <button type="button" id="addRow">Add Row</button>
        <button type="submit">Submit</button>
    </form>

    <script>
    function generateTimeOptions() {
        const options = [];
        for (let h = 6; h <= 21; h++) { // Start at 6 AM (6) and include up to 9 PM (21)
            for (let m = 0; m < 60; m += 30) {
                // Stop at 9:00 PM
                if (h === 21 && m > 0) break;

                const hour = h % 12 === 0 ? 12 : h % 12;
                const minute = m.toString().padStart(2, '0');
                const period = h < 12 ? 'AM' : 'PM';
                const timeLabel = `${hour}:${minute} ${period}`;
                const timeValue = `${h.toString().padStart(2, '0')}:${minute}`;
                options.push(`<option value="${timeValue}">${timeLabel}</option>`);
            }
        }
        return options.join('');
    }

    function populateTimeDropdowns() {
        const timeOptions = generateTimeOptions();
        document.querySelectorAll('select[name="sessionStart[]"], select[name="sessionEnd[]"]').forEach(select => {
            select.innerHTML = timeOptions;
        });
    }

    document.getElementById('addRow').addEventListener('click', () => {
        const tableBody = document.querySelector('#studentTable tbody');
        const newRow = document.createElement('tr');
        newRow.innerHTML = `
            <td><input type="text" name="studentName[]" required></td>
            <td>
                <select name="sessionStart[]" required>
                    <!-- Options will be populated dynamically -->
                </select>
            </td>
            <td>
                <select name="sessionEnd[]" required>
                    <!-- Options will be populated dynamically -->
                </select>
            </td>
            <td>
                <select name="courtLocation[]" class="court-location" required>
                    <option value="">Select Location</option>
                    <option value="UWA">UWA</option>
                    <option value="PBA Redcliffe">PBA Redcliffe</option>
                    <option value="PBA Canningvale">PBA Canningvale</option>
                    <option value="PBA Malaga">PBA Malaga</option>
                    <option value="Kingsway">Kingsway</option>
                </select>
            </td>
            <td>
                <select name="courtType[]" class="court-type hidden">
                    <option value="">Select Type</option>
                    <option value="Indoor">Indoor</option>
                    <option value="Outdoor">Outdoor</option>
                </select>
            </td>
            <td><button type="button" class="delete-row">Delete</button></td>
        `;
        tableBody.appendChild(newRow);
        populateTimeDropdowns();
        updateEventListeners();
    });

    function updateEventListeners() {
        document.querySelectorAll('.delete-row').forEach(button => {
            button.addEventListener('click', (event) => {
                event.target.closest('tr').remove();
            });
        });

        document.querySelectorAll('.court-location').forEach(select => {
            select.addEventListener('change', (event) => {
                const courtType = event.target.closest('tr').querySelector('.court-type');
                if (event.target.value === 'PBA Canningvale') {
                    courtType.classList.remove('hidden');
                    courtType.setAttribute('required', 'required');
                } else {
                    courtType.classList.add('hidden');
                    courtType.removeAttribute('required');
                }
            });
        });
    }

    populateTimeDropdowns();
    updateEventListeners();
</script>

</body>
</html>

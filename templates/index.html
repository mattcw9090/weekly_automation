<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dynamic Table for Student Sessions</title>
    <style>
        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
        }
        table, th, td {
            border: 1px solid #ccc;
        }
        th, td {
            padding: 10px;
            text-align: left;
            vertical-align: top;
        }
        .hidden {
            display: none;
        }
        button {
            padding: 5px 10px;
            margin: 2px;
        }
        option[disabled] {
            color: #ccc;
        }
    </style>
</head>
<body>
    <h1>Dynamic Table for Student Sessions</h1>
    <form action="/submit" method="POST">
        <table id="studentTable">
            <thead>
                <tr>
                    <th>Student Name</th>
                    <th>Day of the Week</th>
                    <th>Court Location</th>
                    <th>Session Start</th>
                    <th>Session End</th>
                    <th>Court Type</th>
                    <th>Credits to Book</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <!-- Rows will be added dynamically -->
            </tbody>
        </table>
        <button type="button" id="addRow">Add Row</button>
        <button type="button" id="loadConfigButton">Load Config</button>
        <input type="file" id="configFileInput" accept=".json" style="display: none;">
        <button type="button" id="saveConfigButton">Save Config</button>
        <button type="submit">Check Court Availability</button>
    </form>

    <script>
    // Function to convert time string to minutes
    function convertTimeToMinutes(timeStr) {
        const [hourStr, minuteStr] = timeStr.split(':');
        const hour = parseInt(hourStr, 10);
        const minute = parseInt(minuteStr, 10);
        return hour * 60 + minute;
    }

    // Function to generate time options based on location and day
    function generateTimeOptions(location, day) {
        let openingTime = 0;
        let closingTime = 0;

        // Define opening and closing times based on location and day
        if (location === 'PBA Malaga') {
            if (['Saturday', 'Sunday'].includes(day)) {
                openingTime = 9;
                closingTime = 22;
            } else { // Weekdays
                openingTime = 13;
                closingTime = 22;
            }
        } else if (location === 'PBA Canningvale') {
            if (day === 'Sunday') {
                openingTime = 9;
                closingTime = 20;
            } else if (day === 'Saturday') {
                openingTime = 9;
                closingTime = 22;
            } else { // Weekdays
                openingTime = 10;
                closingTime = 22;
            }
        }

        const options = [];
        for (let h = openingTime; h <= closingTime; h++) {
            for (let m = 0; m < 60; m += 30) {
                if (h === closingTime && m > 0) break;

                const hour = h % 12 === 0 ? 12 : h % 12;
                const minute = m.toString().padStart(2, '0');
                const period = h < 12 ? 'AM' : 'PM';
                const timeLabel = `${hour}:${minute} ${period}`;
                const timeValue = `${h.toString().padStart(2, '0')}:${minute}`;
                options.push(`<option value="${timeValue}">${timeLabel}</option>`);
            }
        }
        return options.join('');
    }

    // Function to populate time dropdowns
    function populateTimeDropdowns(row, selectedStartTime = '', selectedEndTime = '') {
        const location = row.querySelector('.court-location').value;
        const day = row.querySelector('.day-of-week').value;

        const sessionStartSelect = row.querySelector('.session-start');
        const sessionEndSelect = row.querySelector('.session-end');

        if (!location || !day) {
            sessionStartSelect.innerHTML = '<option value="">Select Time</option>';
            sessionEndSelect.innerHTML = '<option value="">Select Time</option>';
            return;
        }

        const timeOptions = generateTimeOptions(location, day);

        sessionStartSelect.innerHTML = '<option value="">Select Time</option>' + timeOptions;
        sessionEndSelect.innerHTML = '<option value="">Select Time</option>' + timeOptions;

        // Set the selected values if provided
        if (selectedStartTime) {
            sessionStartSelect.value = selectedStartTime;
        }
        if (selectedEndTime) {
            sessionEndSelect.value = selectedEndTime;
        }

        // Update end time options based on start time
        handleSessionStartChange({ target: sessionStartSelect });
    }

    // Handle session start change
    function handleSessionStartChange(event) {
        const row = event.target.closest('tr');
        const sessionStartSelect = row.querySelector('.session-start');
        const sessionEndSelect = row.querySelector('.session-end');
        const selectedStartTime = sessionStartSelect.value;

        if (!selectedStartTime) {
            Array.from(sessionEndSelect.options).forEach(option => {
                option.disabled = false;
            });
            return;
        }

        const startTimeMinutes = convertTimeToMinutes(selectedStartTime);

        Array.from(sessionEndSelect.options).forEach(option => {
            const optionTimeMinutes = convertTimeToMinutes(option.value);
            if (optionTimeMinutes <= startTimeMinutes) {
                option.disabled = true;
            } else {
                option.disabled = false;
            }
        });

        if (sessionEndSelect.value) {
            const selectedEndTimeMinutes = convertTimeToMinutes(sessionEndSelect.value);
            if (selectedEndTimeMinutes <= startTimeMinutes) {
                sessionEndSelect.value = '';
            }
        }

        updateCredits();
    }

    // Calculate credits based on session details
    function calculateCredits(start, end, location, type, day) {
        if (!start || !end || !location || !day) return '';
        if (location === 'PBA Canningvale' && !type) return '';

        const [startHour, startMinute] = start.split(':').map(Number);
        const [endHour, endMinute] = end.split(':').map(Number);

        const startTotalMinutes = startHour * 60 + startMinute;
        const endTotalMinutes = endHour * 60 + endMinute;

        if (endTotalMinutes <= startTotalMinutes) return '';

        let credits = [];

        let rateChangePoints = [];

        if (location === 'PBA Malaga') {
            if (!['Saturday', 'Sunday'].includes(day)) {
                rateChangePoints.push(17 * 60); // 5 PM
            }
        } else if (location === 'PBA Canningvale') {
            if (!['Saturday', 'Sunday'].includes(day)) {
                rateChangePoints.push(17 * 60); // 5 PM
            }
        }

        rateChangePoints = [...new Set(rateChangePoints)].sort((a, b) => a - b);
        rateChangePoints.push(endTotalMinutes);

        let currentStart = startTotalMinutes;
        let currentEnd;

        while (currentStart < endTotalMinutes) {
            let nextChange = rateChangePoints.find(point => point > currentStart);
            if (!nextChange) {
                nextChange = endTotalMinutes;
            }

            currentEnd = Math.min(nextChange, endTotalMinutes);

            const isWeekend = (day === 'Saturday' || day === 'Sunday');
            const isAfter5PM = currentStart >= 17 * 60;
            const isWeekendOrAfter5PM = isWeekend || isAfter5PM;

            let ratePerHour = 0;
            if (location === 'PBA Malaga') {
                ratePerHour = isWeekendOrAfter5PM ? 25 : 15;
            } else if (location === 'PBA Canningvale') {
                if (type === 'Hebat Court') {
                    ratePerHour = isWeekendOrAfter5PM ? 26 : 16;
                } else if (type === 'Super Court') {
                    ratePerHour = isWeekendOrAfter5PM ? 29 : 19;
                }
            }

            let durationMinutes = currentEnd - currentStart;
            let fullHours = Math.floor(durationMinutes / 60);
            let halfHours = Math.floor((durationMinutes % 60) / 30);

            if (fullHours > 0) {
                credits.push(`${fullHours}x $${ratePerHour.toFixed(2)}`);
            }

            if (halfHours > 0) {
                const halfHourRate = (ratePerHour / 2).toFixed(2);
                credits.push(`1x $${halfHourRate}`);
            }

            currentStart = currentEnd;
        }

        return credits.join('<br>');
    }

    // Update credits for all rows
    function updateCredits() {
        document.querySelectorAll('#studentTable tbody tr').forEach(row => {
            const start = row.querySelector('.session-start').value;
            const end = row.querySelector('.session-end').value;
            const location = row.querySelector('.court-location').value;
            const type = row.querySelector('.court-type').value;
            const day = row.querySelector('.day-of-week').value;
            const creditsCell = row.querySelector('.credits-to-book');
            creditsCell.innerHTML = calculateCredits(start, end, location, type, day);
        });
    }

    // Delete a row
    function deleteRow(event) {
        event.target.closest('tr').remove();
        updateCredits();
    }

    // Handle court location change
    function handleCourtLocationChange(event) {
        const row = event.target.closest('tr');
        const courtTypeSelect = row.querySelector('.court-type');
        const location = event.target.value;

        if (location === 'PBA Canningvale') {
            courtTypeSelect.classList.remove('hidden');
            courtTypeSelect.setAttribute('required', 'required');
        } else {
            courtTypeSelect.classList.add('hidden');
            courtTypeSelect.removeAttribute('required');
            courtTypeSelect.value = '';
        }

        populateTimeDropdowns(row);
        updateCredits();
    }

    // Handle day of week change
    function handleDayOfWeekChange(event) {
        const row = event.target.closest('tr');
        populateTimeDropdowns(row);
        updateCredits();
    }

    // Handle court type change
    function handleCourtTypeChange(event) {
        updateCredits();
    }

    // Update event listeners
    function updateEventListeners() {
        document.querySelectorAll('.delete-row').forEach(button => {
            button.removeEventListener('click', deleteRow);
            button.addEventListener('click', deleteRow);
        });

        document.querySelectorAll('.court-location').forEach(select => {
            select.removeEventListener('change', handleCourtLocationChange);
            select.addEventListener('change', handleCourtLocationChange);
        });

        document.querySelectorAll('.day-of-week').forEach(select => {
            select.removeEventListener('change', handleDayOfWeekChange);
            select.addEventListener('change', handleDayOfWeekChange);
        });

        document.querySelectorAll('.session-start').forEach(select => {
            select.removeEventListener('change', handleSessionStartChange);
            select.addEventListener('change', handleSessionStartChange);
        });

        document.querySelectorAll('.session-end').forEach(select => {
            select.removeEventListener('change', updateCredits);
            select.addEventListener('change', updateCredits);
        });

        document.querySelectorAll('.court-type').forEach(select => {
            select.removeEventListener('change', handleCourtTypeChange);
            select.addEventListener('change', handleCourtTypeChange);
        });
    }

    // Add new row
    document.getElementById('addRow').addEventListener('click', () => {
        const tableBody = document.querySelector('#studentTable tbody');
        const newRow = document.createElement('tr');
        newRow.innerHTML = `
            <td><input type="text" class="student-name" name="studentName[]" required></td>
            <td>
                <select name="dayOfWeek[]" class="day-of-week" required>
                    <option value="">Select Day</option>
                    <option value="Monday">Monday</option>
                    <option value="Tuesday">Tuesday</option>
                    <option value="Wednesday">Wednesday</option>
                    <option value="Thursday">Thursday</option>
                    <option value="Friday">Friday</option>
                    <option value="Saturday">Saturday</option>
                    <option value="Sunday">Sunday</option>
                </select>
            </td>
            <td>
                <select name="courtLocation[]" class="court-location" required>
                    <option value="">Select Location</option>
                    <option value="PBA Canningvale">PBA Canningvale</option>
                    <option value="PBA Malaga">PBA Malaga</option>
                </select>
            </td>
            <td>
                <select name="sessionStart[]" class="session-start" required>
                    <option value="">Select Time</option>
                </select>
            </td>
            <td>
                <select name="sessionEnd[]" class="session-end" required>
                    <option value="">Select Time</option>
                </select>
            </td>
            <td>
                <select name="courtType[]" class="court-type hidden">
                    <option value="">Select Type</option>
                    <option value="Hebat Court">Hebat Court</option>
                    <option value="Super Court">Super Court</option>
                </select>
            </td>
            <td class="credits-to-book"></td>
            <td><button type="button" class="delete-row">Delete</button></td>
        `;
        tableBody.appendChild(newRow);
        const lastRow = tableBody.lastElementChild;
        populateTimeDropdowns(lastRow);
        updateEventListeners();
        updateCredits();
    });

    // Handle "Load Config" button click
    document.getElementById('loadConfigButton').addEventListener('click', () => {
        document.getElementById('configFileInput').click();
    });

    // Handle file input change
    document.getElementById('configFileInput').addEventListener('change', handleFileSelect);

    // Read and process the selected configuration file
    function handleFileSelect(event) {
        const file = event.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                const configData = JSON.parse(e.target.result);
                prefillForm(configData);
            } catch (error) {
                alert('Invalid configuration file. Please ensure it is a valid JSON file.');
                console.error(error);
            }
        };
        reader.readAsText(file);
    }

    // Prefill the form with data from the configuration file
    function prefillForm(data) {
        // Clear existing rows
        const tableBody = document.querySelector('#studentTable tbody');
        tableBody.innerHTML = '';

        data.forEach(session => {
            const newRow = document.createElement('tr');
            newRow.innerHTML = `
                <td><input type="text" class="student-name" name="studentName[]" required></td>
                <td>
                    <select name="dayOfWeek[]" class="day-of-week" required>
                        <option value="">Select Day</option>
                        <option value="Monday">Monday</option>
                        <option value="Tuesday">Tuesday</option>
                        <option value="Wednesday">Wednesday</option>
                        <option value="Thursday">Thursday</option>
                        <option value="Friday">Friday</option>
                        <option value="Saturday">Saturday</option>
                        <option value="Sunday">Sunday</option>
                    </select>
                </td>
                <td>
                    <select name="courtLocation[]" class="court-location" required>
                        <option value="">Select Location</option>
                        <option value="PBA Canningvale">PBA Canningvale</option>
                        <option value="PBA Malaga">PBA Malaga</option>
                    </select>
                </td>
                <td>
                    <select name="sessionStart[]" class="session-start" required>
                        <option value="">Select Time</option>
                    </select>
                </td>
                <td>
                    <select name="sessionEnd[]" class="session-end" required>
                        <option value="">Select Time</option>
                    </select>
                </td>
                <td>
                    <select name="courtType[]" class="court-type ${session.courtLocation === 'PBA Canningvale' ? '' : 'hidden'}">
                        <option value="">Select Type</option>
                        <option value="Hebat Court">Hebat Court</option>
                        <option value="Super Court">Super Court</option>
                    </select>
                </td>
                <td class="credits-to-book"></td>
                <td><button type="button" class="delete-row">Delete</button></td>
            `;
            tableBody.appendChild(newRow);

            const lastRow = tableBody.lastElementChild;

            // Set the values
            lastRow.querySelector('.student-name').value = session.studentName || '';
            lastRow.querySelector('.day-of-week').value = session.dayOfWeek || '';
            lastRow.querySelector('.court-location').value = session.courtLocation || '';
            lastRow.querySelector('.court-type').value = session.courtType || '';

            // Handle court type visibility
            const courtTypeSelect = lastRow.querySelector('.court-type');
            if (session.courtLocation === 'PBA Canningvale') {
                courtTypeSelect.classList.remove('hidden');
                courtTypeSelect.setAttribute('required', 'required');
            } else {
                courtTypeSelect.classList.add('hidden');
                courtTypeSelect.removeAttribute('required');
                courtTypeSelect.value = '';
            }

            // Populate time dropdowns with selected times
            populateTimeDropdowns(lastRow, session.sessionStart || '', session.sessionEnd || '');
        });

        updateEventListeners();
        updateCredits();
    }

    // Handle "Save Config" button click
    document.getElementById('saveConfigButton').addEventListener('click', () => {
        const configData = [];
        document.querySelectorAll('#studentTable tbody tr').forEach(row => {
            const studentName = row.querySelector('input[name="studentName[]"]').value;
            const dayOfWeek = row.querySelector('.day-of-week').value;
            const courtLocation = row.querySelector('.court-location').value;
            const sessionStart = row.querySelector('.session-start').value;
            const sessionEnd = row.querySelector('.session-end').value;
            const courtType = row.querySelector('.court-type').value;

            const sessionData = {
                studentName,
                dayOfWeek,
                courtLocation,
                sessionStart,
                sessionEnd,
                courtType
            };
            configData.push(sessionData);
        });

        const dataStr = JSON.stringify(configData, null, 4);
        const blob = new Blob([dataStr], { type: 'application/json' });
        const url = URL.createObjectURL(blob);

        const downloadLink = document.createElement('a');
        downloadLink.href = url;
        downloadLink.download = 'config.json';
        document.body.appendChild(downloadLink);
        downloadLink.click();
        document.body.removeChild(downloadLink);
        URL.revokeObjectURL(url);
    });

    // Initialize the form on page load
    document.addEventListener('DOMContentLoaded', () => {
        // Add an empty row by default
        document.getElementById('addRow').click();
    });
    </script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Table for Student Sessions</title>
    <style>
        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
        }
        table, th, td {
            border: 1px solid #ccc;
        }
        th, td {
            padding: 10px;
            text-align: left;
        }
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <h1>Dynamic Table for Student Sessions</h1>
    <form action="/submit" method="POST">
        <table id="studentTable">
            <thead>
                <tr>
                    <th>Student Name</th>
                    <th>Day of the Week</th>
                    <th>Session Start</th>
                    <th>Session End</th>
                    <th>Court Location</th>
                    <th>Court Type</th>
                    <th>Credits to Book</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td><input type="text" name="studentName[]" required></td>
                    <td>
                        <select name="dayOfWeek[]" class="day-of-week" required>
                            <option value="Monday">Monday</option>
                            <option value="Tuesday">Tuesday</option>
                            <option value="Wednesday">Wednesday</option>
                            <option value="Thursday">Thursday</option>
                            <option value="Friday">Friday</option>
                            <option value="Saturday">Saturday</option>
                            <option value="Sunday">Sunday</option>
                        </select>
                    </td>
                    <td>
                        <select name="sessionStart[]" class="session-start" required>
                            <!-- Options will be populated dynamically -->
                        </select>
                    </td>
                    <td>
                        <select name="sessionEnd[]" class="session-end" required>
                            <!-- Options will be populated dynamically -->
                        </select>
                    </td>
                    <td>
                        <select name="courtLocation[]" class="court-location" required>
                            <option value="">Select Location</option>
                            <option value="PBA Redcliffe">PBA Redcliffe</option>
                            <option value="PBA Canningvale">PBA Canningvale</option>
                            <option value="PBA Malaga">PBA Malaga</option>
                        </select>
                    </td>
                    <td>
                        <select name="courtType[]" class="court-type hidden">
                            <option value="">Select Type</option>
                            <option value="Hebat Court">Hebat Court</option>
                            <option value="Super Court">Super Court</option>
                        </select>
                    </td>
                    <td class="credits-to-book"></td>
                    <td><button type="button" class="delete-row">Delete</button></td>
                </tr>
            </tbody>
        </table>
        <button type="button" id="addRow">Add Row</button>
        <button type="submit">Submit</button>
    </form>

    <script>
    function generateTimeOptions() {
        const options = [];
        for (let h = 6; h <= 21; h++) { // Start at 6 AM (6) and include up to 9 PM (21)
            for (let m = 0; m < 60; m += 30) {
                // Stop at 9:00 PM
                if (h === 21 && m > 0) break;

                const hour = h % 12 === 0 ? 12 : h % 12;
                const minute = m.toString().padStart(2, '0');
                const period = h < 12 ? 'AM' : 'PM';
                const timeLabel = `${hour}:${minute} ${period}`;
                const timeValue = `${h.toString().padStart(2, '0')}:${minute}`;
                options.push(`<option value="${timeValue}">${timeLabel}</option>`);
            }
        }
        return options.join('');
    }

    function populateTimeDropdowns() {
        const timeOptions = generateTimeOptions();
        document.querySelectorAll('select[name="sessionStart[]"], select[name="sessionEnd[]"]').forEach(select => {
            select.innerHTML = timeOptions;
        });
    }

    document.getElementById('addRow').addEventListener('click', () => {
        const tableBody = document.querySelector('#studentTable tbody');
        const newRow = document.createElement('tr');
        newRow.innerHTML = `
            <td><input type="text" name="studentName[]" required></td>
            <td>
                <select name="dayOfWeek[]" class="day-of-week" required>
                    <option value="Monday">Monday</option>
                    <option value="Tuesday">Tuesday</option>
                    <option value="Wednesday">Wednesday</option>
                    <option value="Thursday">Thursday</option>
                    <option value="Friday">Friday</option>
                    <option value="Saturday">Saturday</option>
                    <option value="Sunday">Sunday</option>
                </select>
            </td>
            <td>
                <select name="sessionStart[]" class="session-start" required>
                    <!-- Options will be populated dynamically -->
                </select>
            </td>
            <td>
                <select name="sessionEnd[]" class="session-end" required>
                    <!-- Options will be populated dynamically -->
                </select>
            </td>
            <td>
                <select name="courtLocation[]" class="court-location" required>
                    <option value="">Select Location</option>
                    <option value="PBA Redcliffe">PBA Redcliffe</option>
                    <option value="PBA Canningvale">PBA Canningvale</option>
                    <option value="PBA Malaga">PBA Malaga</option>
                </select>
            </td>
            <td>
                <select name="courtType[]" class="court-type hidden">
                    <option value="">Select Type</option>
                    <option value="Hebat Court">Hebat Court</option>
                    <option value="Super Court">Super Court</option>
                </select>
            </td>
            <td class="credits-to-book"></td>
            <td><button type="button" class="delete-row">Delete</button></td>
        `;
        tableBody.appendChild(newRow);
        populateTimeDropdowns();
        updateEventListeners();
    });

    function calculateCredits(start, end, location, type, day) {
        if (!start || !end) return '';

        const [startHour, startMinute] = start.split(':').map(Number);
        const [endHour, endMinute] = end.split(':').map(Number);

        let totalMinutes = (endHour * 60 + endMinute) - (startHour * 60 + startMinute);
        if (totalMinutes <= 0) return '';

        let credits = '';
        const hours = Math.floor(totalMinutes / 60);
        const halfHours = (totalMinutes % 60) / 30;

        function getPrice(location, type, hour, isWeekendOrAfter5PM) {
            if (location === 'PBA Redcliffe') {
                return isWeekendOrAfter5PM ? 25 : 15;
            } else if (location === 'PBA Canningvale') {
                if (type === 'Hebat Court') {
                    return isWeekendOrAfter5PM ? 26 : 16;
                } else if (type === 'Super Court') {
                    return isWeekendOrAfter5PM ? 29 : 19;
                }
            } else if (location === 'PBA Malaga') {
                return isWeekendOrAfter5PM ? 29 : 19;
            }
            return 0;
        }

        const isWeekend = (day === 'Saturday' || day === 'Sunday');
        const isAfter5PM = startHour >= 17;
        const isWeekendOrAfter5PM = isWeekend || isAfter5PM;
        const pricePerHour = getPrice(location, type, startHour, isWeekendOrAfter5PM);

        if (hours > 0) {
            credits += `${hours}x $${(pricePerHour).toFixed(2)}\n`;
        }
        if (halfHours > 0) {
            credits += `${halfHours}x $${(pricePerHour / 2).toFixed(2)}`;
        }

        // Check if all credits are $0.00, if so, return an empty string
        if (credits.split('\n').every(line => line.includes('$0.00'))) {
            return '';
        }

        return credits;
    }

    function updateCredits() {
        document.querySelectorAll('#studentTable tbody tr').forEach(row => {
            const start = row.querySelector('.session-start').value;
            const end = row.querySelector('.session-end').value;
            const location = row.querySelector('.court-location').value;
            const type = row.querySelector('.court-type').value;
            const day = row.querySelector('.day-of-week').value;
            const creditsCell = row.querySelector('.credits-to-book');
            creditsCell.textContent = calculateCredits(start, end, location, type, day);
        });
    }

    function updateEventListeners() {
        document.querySelectorAll('.delete-row').forEach(button => {
            button.addEventListener('click', (event) => {
                event.target.closest('tr').remove();
                updateCredits();
            });
        });

        document.querySelectorAll('.court-location').forEach(select => {
            select.addEventListener('change', (event) => {
                const courtType = event.target.closest('tr').querySelector('.court-type');
                if (event.target.value === 'PBA Canningvale') {
                    courtType.classList.remove('hidden');
                    courtType.setAttribute('required', 'required');
                } else {
                    courtType.classList.add('hidden');
                    courtType.removeAttribute('required');
                    courtType.value = '';
                }
                updateCredits();
            });
        });

        document.querySelectorAll('.session-start, .session-end, .day-of-week').forEach(select => {
            select.addEventListener('change', updateCredits);
        });

        document.querySelectorAll('.court-type').forEach(select => {
            select.addEventListener('change', updateCredits);
        });
    }

    populateTimeDropdowns();
    updateEventListeners();
</script>

</body>
</html>
